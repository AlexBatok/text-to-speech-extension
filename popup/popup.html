<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="controls">
      <button id="rewind" class="btn-control" title="Previous (Alt+,)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
      <button id="play" class="btn-control btn-play" title="Play (Alt+P)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button id="pause" class="btn-control btn-play hidden" title="Pause (Alt+P)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <button id="stop" class="btn-control" title="Stop (Alt+S)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h12v12H6z"/>
        </svg>
      </button>
      <button id="forward" class="btn-control" title="Next (Alt+.)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
        </svg>
      </button>
    </div>

    <div class="settings">
      <div class="setting-row">
        <label for="voice">Voice</label>
        <select id="voice"></select>
      </div>
      <div class="setting-row">
        <label for="speed">Speed <span id="speed-value">1.0x</span></label>
        <input type="range" id="speed" min="0.5" max="3" step="0.1" value="1">
      </div>
      <div class="setting-row">
        <label for="pitch">Pitch <span id="pitch-value">1.0</span></label>
        <input type="range" id="pitch" min="0" max="2" step="0.1" value="1">
      </div>
      <div class="setting-row">
        <label for="volume">Volume <span id="volume-value">100%</span></label>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
      </div>
    </div>

    <div id="tab-conflict" class="tab-conflict hidden">
      <button id="read-this-tab" class="btn-small btn-accent">Read this page</button>
    </div>

    <div id="status" class="status"></div>

    <a id="rate-link" class="rate-link" href="#" target="_blank">
      <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
      <span>Please rate us</span>
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
